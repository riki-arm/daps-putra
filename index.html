<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAPS Putra</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --success: #27ae60;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 420px;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (min-height: 600px) {
            .container {
                height: auto;
                border-radius: 24px;
                padding-bottom: 20px;
            }
        }

        .header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .header h1 {
            font-size: 20px;
            color: var(--primary);
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #reader {
            width: 100%;
            background: #000;
            overflow: hidden;
        }

        /* Menghilangkan UI bawaan library agar bersih */
        #reader__dashboard, #reader__status_span, #reader button {
            display: none !important;
        }

        .status-box {
            padding: 25px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #status-text {
            font-size: 16px;
            color: #7f8c8d;
            transition: all 0.3s ease;
        }

        .status-active {
            color: var(--success) !important;
            font-weight: bold;
            transform: scale(1.1);
        }

        .scan-line {
            height: 2px;
            background: var(--accent);
            width: 100%;
            position: absolute;
            top: 50%;
            animation: moveScan 2s infinite linear;
            box-shadow: 0 0 8px var(--accent);
            z-index: 10;
        }

        @keyframes moveScan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .camera-container {
            position: relative;
            background: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>DAPS PUTRA</h1>
    </div>

    <div class="camera-container">
        <div id="reader"></div>
        <div class="scan-line"></div>
    </div>

    <div class="status-box">
        <div id="status-text">Siap Memindai Barcode...</div>
    </div>
</div>

<script>
    const statusText = document.getElementById('status-text');
    let isScanning = true;

    function onScanSuccess(decodedText) {
        if (!isScanning) return;
        
        isScanning = false; // Kunci agar tidak double scan
        statusText.innerText = "Memproses: " + decodedText;
        statusText.style.color = "#2980b9";

        // Suara beep singkat (opsional, beberapa browser memblokir auto-audio)
        try { new AudioContext().resume(); } catch(e){}

        google.script.run.withSuccessHandler(function(response) {
            statusText.innerText = response;
            statusText.classList.add('status-active');

            // Reset scanner setelah 1.2 detik (Sangat Cepat)
            setTimeout(() => {
                statusText.innerText = "Siap Memindai Barcode...";
                statusText.classList.remove('status-active');
                statusText.style.color = "#7f8c8d";
                isScanning = true;
            }, 1200);
        }).processScan(decodedText);
    }

    const html5QrCode = new Html5Qrcode("reader");
    const config = { 
        fps: 20, // High FPS untuk respon instan
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0
    };

    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess
    ).catch(err => {
        statusText.innerText = "Kamera tidak terdeteksi atau izin ditolak.";
        statusText.style.color = "red";
    });
</script>

</body>
</html>
