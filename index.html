<script>
    const statusText = document.getElementById('status-text');
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwmkWVdsiPC2gyoy6zgZVWB0ow-FVI1Z1WYQ1jLcy1juc-0XUYS9IMDGCgZFMOte2iC/exec"; // Ganti dengan URL dari langkah di atas
    let isScanning = true;

    function onScanSuccess(decodedText) {
        if (!isScanning) return;
        isScanning = false;
        
        statusText.innerText = "Mengirim: " + decodedText + "...";
        
        // Kirim data ke Google Apps Script menggunakan Fetch API
        fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ nama: decodedText }),
        })
        .then(response => response.json())
        .then(data => {
            if (data.result === "success") {
                statusText.innerText = "Berhasil: " + data.nama;
                statusText.classList.add('status-active');
            } else {
                statusText.innerText = "Gagal: " + data.message;
            }
            
            setTimeout(() => {
                statusText.innerText = "Siap Memindai...";
                statusText.classList.remove('status-active');
                isScanning = true;
            }, 1500);
        })
        .catch(err => {
            statusText.innerText = "Kesalahan Koneksi!";
            console.error(err);
            setTimeout(() => { isScanning = true; }, 3000);
        });
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);
</script>
